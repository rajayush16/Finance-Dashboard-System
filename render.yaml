services:
  - type: web
    name: finance-dashboard-backend
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: finance-dashboard-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: BCRYPT_SALT_ROUNDS
        value: "10"
      - key: CORS_ORIGIN
        value: "*"
      - key: SWAGGER_ENABLED
        value: "true"

databases:
  - name: finance-dashboard-db
    plan: free
    databaseName: finance_dashboard
    user: finance_dashboard_user
